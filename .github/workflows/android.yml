name: Android debug APK

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and NDK
        shell: bash
        run: |
          # GitHub invokes bash with pipefail. `yes` is expected to receive
          # SIGPIPE after sdkmanager has consumed the final prompt, so do not
          # let that expected exit code abort the build.
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;28.2.13676358" \
            "cmake;3.22.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Cache embedded Perl
        uses: actions/cache@v4
        with:
          path: |
            native/downloads
            native/perl
            app/src/main/assets/perl/lib
          key: perl-android-${{ runner.os }}-${{ hashFiles('native/build_perl_android.sh') }}

      - name: Test headless scene engine
        run: prove -v t/engine.t

      - name: Build embedded Perl
        shell: bash
        run: |
          set +e
          ANDROID_NDK_HOME="$ANDROID_HOME/ndk/28.2.13676358" \
            ./native/build_perl_android.sh 2>&1 | tee native/perl-build.log
          status=${PIPESTATUS[0]}
          set -e
          if [[ $status -ne 0 ]]; then
            matches=$(grep -E \
              'error:|undefined reference|No rule to make target|make(\[[0-9]+\])?: \*\*\*' \
              native/perl-build.log || true)
            diagnostic="$matches
          --- final 40 lines ---
          $(tail -n 40 native/perl-build.log)"
            diagnostic=${diagnostic//'%'/'%25'}
            diagnostic=${diagnostic//$'\r'/'%0D'}
            diagnostic=${diagnostic//$'\n'/'%0A'}
            echo "::error title=Embedded Perl build::$diagnostic"
            exit "$status"
          fi

      - name: Upload native build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: embedded-perl-build-log
          path: native/perl-build.log
          if-no-files-found: ignore

      - name: Build debug APK
        run: gradle --no-daemon :app:assembleDebug

      - name: Stage APK
        shell: bash
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk \
            "dist/asciitrekpaper-${GITHUB_REF_NAME}-debug.apk"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: asciitrekpaper-${{ github.ref_name }}-debug
          path: dist/*.apk
          if-no-files-found: error

  publish-tagged-debug:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-debug
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download built APK
        uses: actions/download-artifact@v4
        with:
          name: asciitrekpaper-${{ github.ref_name }}-debug
          path: dist

      - name: Create release or replace its debug APK
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.apk --clobber
          else
            gh release create "$TAG" dist/*.apk \
              --title "Asciitrekpaper $TAG" \
              --generate-notes
          fi
